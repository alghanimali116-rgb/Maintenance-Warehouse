<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متابعة الصيانة - الماسة موبايل</title>
    <style>
        /* --- أنماط أساسية --- */
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f4f7fc; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 1000px; width: 100%; background: white; border-radius: 24px; padding: 25px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); }
        h1 { color: #1a2b4a; font-size: 24px; margin-top: 0; display: flex; align-items: center; gap: 10px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px,1fr)); gap: 15px; background: #f0f4fe; padding: 20px; border-radius: 16px; margin: 20px 0; }
        .stat-item { text-align: center; }
        .stat-number { font-size: 28px; font-weight: bold; color: #1a2b4a; display: block; }
        .stat-label { font-size: 14px; color: #5a6e8a; }
        .section-title { font-size: 18px; font-weight: bold; margin: 25px 0 15px; color: #1a2b4a; }

        /* --- نموذج الإضافة --- */
        .add-form { display: flex; flex-wrap: wrap; gap: 12px; background: #f8fafd; padding: 20px; border-radius: 16px; margin-bottom: 25px; align-items: end; }
        .form-group { flex: 1 0 150px; }
        .form-group label { display: block; font-size: 13px; color: #3a4e6a; margin-bottom: 4px; }
        .form-group input, .form-group select { width: 100%; padding: 10px 12px; border: 1px solid #dce3ed; border-radius: 10px; font-size: 14px; }
        .btn { background: #1a2b4a; color: white; border: none; padding: 10px 24px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: #2a3f62; transform: scale(1.01); }
        .btn-danger { background: #b13e3e; }
        .btn-danger:hover { background: #8f2e2e; }
        .btn-success { background: #1f8b4c; }
        .btn-success:hover { background: #15733e; }
        .btn-warning { background: #b8860b; }
        .btn-warning:hover { background: #9a7209; }

        /* --- قائمة الأجهزة --- */
        .device-list { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .device-card { background: white; border: 1px solid #e9edf4; border-radius: 14px; padding: 15px 20px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; transition: 0.15s; }
        .device-card:hover { background: #fafcff; border-color: #bcc9db; }
        .device-info { display: flex; flex-wrap: wrap; gap: 10px 20px; align-items: center; }
        .device-name { font-weight: bold; font-size: 16px; }
        .device-detail { color: #3a5a7a; font-size: 14px; background: #eef3f9; padding: 2px 12px; border-radius: 30px; }
        .device-status { padding: 4px 14px; border-radius: 30px; font-size: 13px; font-weight: 600; }
        .status-pending { background: #fde7a0; color: #7a6100; }
        .status-repair { background: #b3d9ff; color: #00407a; }
        .status-ready { background: #b0e5b8; color: #1a5a1a; }
        .device-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-sm { padding: 5px 14px; font-size: 13px; border-radius: 30px; border: none; cursor: pointer; }

        .empty-message { color: #7a8aa0; text-align: center; padding: 30px 0; background: #f9fbfd; border-radius: 16px; }

        /* --- نموذج التعديل (يظهر داخل البطاقة) --- */
        .edit-form { display: flex; flex-wrap: wrap; gap: 8px; width: 100%; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #dce3ed; }
        .edit-form input, .edit-form select { padding: 6px 10px; border: 1px solid #dce3ed; border-radius: 8px; font-size: 13px; flex: 1 0 120px; }

        /* --- أزرار التصدير --- */
        .export-actions { display: flex; gap: 10px; margin: 15px 0; flex-wrap: wrap; }
    </style>
</head>
<body>
<div class="container" id="app">
    <h1>📱 الماسة موبايل - متابعة الصيانة</h1>
    <div style="color:#5a6e8a; margin-bottom:10px;" id="currentDate"></div>

    <!-- الإحصائيات -->
    <div class="stats-grid" id="statsGrid">
        <div class="stat-item"><span class="stat-number" id="countTotal">0</span><span class="stat-label">📱 إجمالي الأجهزة</span></div>
        <div class="stat-item"><span class="stat-number" id="countPending">0</span><span class="stat-label">⏳ بانتظار القطع</span></div>
        <div class="stat-item"><span class="stat-number" id="countRepair">0</span><span class="stat-label">🔧 قيد العمل</span></div>
        <div class="stat-item"><span class="stat-number" id="countReady">0</span><span class="stat-label">✅ جاهزة للتسليم</span></div>
        <div class="stat-item"><span class="stat-number" id="totalRevenue">0</span><span class="stat-label">💰 إيرادات (د.أ)</span></div>
    </div>

    <!-- نموذج إضافة جهاز -->
    <div class="add-form">
        <div class="form-group"><label>اسم العميل</label><input type="text" id="customerName" placeholder="مثال: أحمد"></div>
        <div class="form-group"><label>الجهاز</label><input type="text" id="deviceName" placeholder="مثال: iPhone 12"></div>
        <div class="form-group"><label>المشكلة</label><input type="text" id="issue" placeholder="شاشة مكسورة"></div>
        <div class="form-group"><label>الحالة</label>
            <select id="statusSelect"><option value="قيد العمل">🔧 قيد العمل</option><option value="بانتظار القطع">⏳ بانتظار القطع</option><option value="جاهزة للتسليم">✅ جاهزة للتسليم</option></select>
        </div>
        <div class="form-group"><label>السعر (د.أ)</label><input type="number" id="priceInput" placeholder="0" value="0"></div>
        <button class="btn" id="addBtn">➕ إضافة جهاز</button>
    </div>

    <!-- أزرار التصدير -->
    <div class="export-actions">
        <button class="btn btn-success" id="exportCsvBtn">📥 تصدير CSV</button>
        <button class="btn btn-warning" id="exportJsonBtn">📋 نسخ JSON</button>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
        <span class="section-title">📋 آخر الأجهزة المضافة</span>
        <button class="btn btn-danger btn-sm" id="clearBtn">🗑️ مسح الكل</button>
    </div>

    <!-- قائمة الأجهزة -->
    <div class="device-list" id="deviceList"></div>
</div>

<script>
    (function() {
        const STORAGE_KEY = 'almasa_devices_data';

        // --- تحميل وحفظ ---
        function loadDevices() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try { return JSON.parse(stored); } 
                catch (e) { return []; }
            }
            return [];
        }

        function saveDevices(devices) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(devices));
        }

        // --- التاريخ ---
        function setDate() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('currentDate').textContent = now.toLocaleDateString('ar-JO', options);
        }

        // --- عرض القائمة والإحصائيات ---
        function render(devices) {
            const list = document.getElementById('deviceList');
            if (devices.length === 0) {
                list.innerHTML = `<div class="empty-message">📭 لا توجد أجهزة بعد<br>أضف أول جهاز للصيانة لتبدأ المتابعة</div>`;
            } else {
                list.innerHTML = devices.map((d, index) => {
                    let statusClass = 'status-pending';
                    if (d.status === 'قيد العمل') statusClass = 'status-repair';
                    else if (d.status === 'جاهزة للتسليم') statusClass = 'status-ready';

                    // بناء بطاقة الجهاز مع زر تعديل ونموذج تعديل (مخفي افتراضياً)
                    return `<div class="device-card" data-index="${index}">
                        <div class="device-info" id="display-${index}">
                            <span class="device-name">${d.customer || 'عميل'}</span>
                            <span class="device-detail">📱 ${d.device || 'جهاز'}</span>
                            <span class="device-detail">🛠️ ${d.issue || '----'}</span>
                            <span class="device-status ${statusClass}">${d.status || 'بانتظار القطع'}</span>
                            <span class="device-detail">💵 ${d.price || 0} د.أ</span>
                        </div>
                        <div class="device-actions">
                            <button class="btn-sm btn-warning" data-index="${index}" data-action="edit">✏️ تعديل</button>
                            <button class="btn-sm btn-danger" data-index="${index}" data-action="delete">🗑️ حذف</button>
                        </div>
                        <!-- نموذج التعديل (مخفي) -->
                        <div class="edit-form" id="edit-${index}" style="display:none;">
                            <input type="text" id="edit-customer-${index}" value="${d.customer || ''}" placeholder="العميل">
                            <input type="text" id="edit-device-${index}" value="${d.device || ''}" placeholder="الجهاز">
                            <input type="text" id="edit-issue-${index}" value="${d.issue || ''}" placeholder="المشكلة">
                            <select id="edit-status-${index}">
                                <option value="قيد العمل" ${d.status === 'قيد العمل' ? 'selected' : ''}>🔧 قيد العمل</option>
                                <option value="بانتظار القطع" ${d.status === 'بانتظار القطع' ? 'selected' : ''}>⏳ بانتظار القطع</option>
                                <option value="جاهزة للتسليم" ${d.status === 'جاهزة للتسليم' ? 'selected' : ''}>✅ جاهزة للتسليم</option>
                            </select>
                            <input type="number" id="edit-price-${index}" value="${d.price || 0}" placeholder="السعر">
                            <button class="btn-sm btn-success" data-index="${index}" data-action="save-edit">💾 حفظ</button>
                            <button class="btn-sm btn-danger" data-index="${index}" data-action="cancel-edit">❌ إلغاء</button>
                        </div>
                    </div>`;
                }).join('');
            }

            // --- تحديث الإحصائيات ---
            const total = devices.length;
            const pending = devices.filter(d => d.status === 'بانتظار القطع').length;
            const repair = devices.filter(d => d.status === 'قيد العمل').length;
            const ready = devices.filter(d => d.status === 'جاهزة للتسليم').length;
            const revenue = devices.reduce((sum, d) => sum + (parseFloat(d.price) || 0), 0);

            document.getElementById('countTotal').textContent = total;
            document.getElementById('countPending').textContent = pending;
            document.getElementById('countRepair').textContent = repair;
            document.getElementById('countReady').textContent = ready;
            document.getElementById('totalRevenue').textContent = revenue.toFixed(2);

            // --- ربط الأحداث ---
            // حذف
            document.querySelectorAll('[data-action="delete"]').forEach(btn => {
                btn.addEventListener('click', function() {
                    const idx = parseInt(this.dataset.index);
                    if (confirm('هل تريد حذف هذا الجهاز نهائياً؟')) {
                        devices.splice(idx, 1);
                        saveDevices(devices);
                        render(devices);
                    }
                });
            });

            // إظهار نموذج التعديل
            document.querySelectorAll('[data-action="edit"]').forEach(btn => {
                btn.addEventListener('click', function() {
                    const idx = parseInt(this.dataset.index);
                    document.getElementById(`display-${idx}`).style.display = 'none';
                    document.getElementById(`edit-${idx}`).style.display = 'flex';
                    // إخفاء أزرار الإجراءات الأخرى مؤقتاً (اختياري)
                });
            });

            // حفظ التعديل
            document.querySelectorAll('[data-action="save-edit"]').forEach(btn => {
                btn.addEventListener('click', function() {
                    const idx = parseInt(this.dataset.index);
                    const customer = document.getElementById(`edit-customer-${idx}`).value.trim();
                    const device = document.getElementById(`edit-device-${idx}`).value.trim();
                    const issue = document.getElementById(`edit-issue-${idx}`).value.trim();
                    const status = document.getElementById(`edit-status-${idx}`).value;
                    const price = parseFloat(document.getElementById(`edit-price-${idx}`).value) || 0;

                    if (!device) {
                        alert('اسم الجهاز مطلوب.');
                        return;
                    }

                    devices[idx] = { customer, device, issue, status, price };
                    saveDevices(devices);
                    render(devices);
                });
            });

            // إلغاء التعديل
            document.querySelectorAll('[data-action="cancel-edit"]').forEach(btn => {
                btn.addEventListener('click', function() {
                    const idx = parseInt(this.dataset.index);
                    document.getElementById(`display-${idx}`).style.display = 'flex';
                    document.getElementById(`edit-${idx}`).style.display = 'none';
                });
            });
        }

        // --- إضافة جهاز جديد ---
        function addDevice() {
            const customer = document.getElementById('customerName').value.trim();
            const device = document.getElementById('deviceName').value.trim();
            const issue = document.getElementById('issue').value.trim();
            const status = document.getElementById('statusSelect').value;
            const price = parseFloat(document.getElementById('priceInput').value) || 0;

            if (!device) {
                alert('يرجى إدخال اسم الجهاز على الأقل.');
                return;
            }

            const devices = loadDevices();
            devices.push({ customer: customer || 'بدون اسم', device, issue: issue || '----', status, price });
            saveDevices(devices);
            render(devices);

            document.getElementById('customerName').value = '';
            document.getElementById('deviceName').value = '';
            document.getElementById('issue').value = '';
            document.getElementById('priceInput').value = '0';
        }

        // --- مسح الكل ---
        function clearAll() {
            if (confirm('هل تريد حذف جميع الأجهزة نهائياً؟')) {
                saveDevices([]);
                render([]);
            }
        }

        // --- تصدير CSV ---
        function exportCSV() {
            const devices = loadDevices();
            if (devices.length === 0) {
                alert('لا توجد بيانات للتصدير.');
                return;
            }
            // تعريف الأعمدة
            const headers = ['العميل', 'الجهاز', 'المشكلة', 'الحالة', 'السعر (د.أ)'];
            const rows = devices.map(d => [
                d.customer || '',
                d.device || '',
                d.issue || '',
                d.status || '',
                d.price || 0
            ]);

            let csvContent = headers.join(',') + '\n';
            rows.forEach(row => {
                // التعامل مع الفواصل داخل النص
                const escapedRow = row.map(cell => `"${String(cell).replace(/"/g, '""')}"`);
                csvContent += escapedRow.join(',') + '\n';
            });

            // تحميل الملف
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.setAttribute('download', `بيانات_الصيانة_${new Date().toISOString().slice(0,10)}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        // --- نسخ JSON ---
        function copyJSON() {
            const devices = loadDevices();
            if (devices.length === 0) {
                alert('لا توجد بيانات للنسخ.');
                return;
            }
            const jsonStr = JSON.stringify(devices, null, 2);
            navigator.clipboard.writeText(jsonStr).then(() => {
                alert('✅ تم نسخ البيانات بصيغة JSON إلى الحافظة.');
            }).catch(() => {
                // في حال فشل clipboard
                prompt('انسخ النص التالي (Ctrl+C):', jsonStr);
            });
        }

        // --- تهيئة الصفحة ---
        function init() {
            setDate();
            const devices = loadDevices();
            render(devices);

            document.getElementById('addBtn').addEventListener('click', addDevice);
            document.getElementById('clearBtn').addEventListener('click', clearAll);
            document.getElementById('exportCsvBtn').addEventListener('click', exportCSV);
            document.getElementById('exportJsonBtn').addEventListener('click', copyJSON);

            document.querySelectorAll('.add-form input, .add-form select').forEach(el => {
                el.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        addDevice();
                    }
                });
            });
        }

        init();
    })();
</script>
</body>
</html>
